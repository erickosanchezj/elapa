<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Taquería El Apá - Floor Plan</title>
    <script src="js/theme.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="js/styles.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#F50057", // Rosa Mexicano
                        "background-light": "#FFFFFF",
                        "background-dark": "#111827",
                        "surface": "#F3F4F6",
                        "border-color": "#E5E7EB",
                        "text-main": "#111827",
                        "text-muted": "#9CA3AF",
                        "alert": "#F59E0B",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "none": "0px",
                        "sm": "0px",
                        "md": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "0px", // Force 0 radius as per design spec
                    },
                    spacing: {
                        "18": "4.5rem",
                    }
                },
            },
        }
    </script>
    <style>
        /* Custom Utilities for the specific brutalist look */
        .striped-bg {
            background: repeating-linear-gradient(
                45deg,
                #F50057,
                #F50057 10px,
                #ffffff 10px,
                #ffffff 20px
            );
        }
        .text-rosa {
            color: #F50057;
        }
        .bg-rosa {
            background-color: #F50057;
        }
        .border-rosa {
            border-color: #F50057;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light text-text-main font-body antialiased min-h-screen flex flex-col relative overflow-x-hidden selection:bg-primary selection:text-white dark:bg-background-dark dark:text-gray-100">
    <!-- Sticky Header -->
    <header class="sticky top-0 z-50 bg-white dark:bg-gray-900 border-b border-border-color dark:border-gray-700">
        <div class="flex items-center justify-between px-4 py-4">
            <div>
                <h1 class="font-display font-bold text-xl uppercase tracking-tight leading-none text-gray-900 dark:text-white">Taquería El Apá</h1>
                <p class="text-xs text-text-muted font-mono mt-1">FLOOR PLAN • MX-CDMX</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm font-bold font-display tracking-tight text-primary uppercase">SHIFT OPEN</span>
                <button id="theme-toggle" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-none border-2 border-transparent transition-colors duration-200 ease-in-out bg-primary" role="switch">
                    <span aria-hidden="true" class="pointer-events-none inline-block h-5 w-5 transform bg-white ring-0 transition duration-200 ease-in-out translate-x-5 shadow-none rounded-none"></span>
                </button>
            </div>
        </div>
        <!-- KPI Strip -->
        <div class="grid grid-cols-3 border-t border-border-color dark:border-gray-700 bg-surface dark:bg-gray-800 divide-x divide-border-color dark:divide-gray-700">
            <div class="flex flex-col items-center justify-center py-3 px-1">
                <span class="text-xs font-mono text-text-muted uppercase mb-1">Incidents</span>
                <span id="kpi-incidents" class="font-display font-bold text-lg leading-none">0</span>
            </div>
            <div class="flex flex-col items-center justify-center py-3 px-1">
                <span class="text-xs font-mono text-text-muted uppercase mb-1">Avg SLA</span>
                <span id="kpi-sla" class="font-display font-bold text-lg leading-none tabular-nums">--:--</span>
            </div>
            <div class="flex flex-col items-center justify-center py-3 px-1">
                <span class="text-xs font-mono text-text-muted uppercase mb-1">Net Sales</span>
                <span id="kpi-sales" class="font-display font-bold text-lg leading-none tabular-nums">$0</span>
            </div>
        </div>
    </header>

    <!-- Main Grid Content -->
    <main class="flex-1 p-4 pb-24 overflow-y-auto bg-white dark:bg-gray-900">
        <div id="floor-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <!-- Cards will be injected here by js/floor.js -->
        </div>
    </main>

    <!-- Floating Action Button -->
    <div class="fixed bottom-20 right-4 z-40">
        <button id="fab-add-table" class="bg-primary hover:bg-rose-600 text-white w-14 h-14 flex items-center justify-center shadow-none transition-transform active:scale-95 border-none rounded-none focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
            <span class="material-symbols-outlined text-3xl">add</span>
        </button>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 w-full z-50 bg-white dark:bg-gray-900 border-t border-border-color dark:border-gray-700">
        <div class="flex gap-2 px-4 pb-4 pt-2">
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
                <div class="flex h-6 items-center justify-center">
                    <span class="material-symbols-outlined text-[24px]">grid_view</span>
                </div>
                <p class="text-xs font-bold font-display uppercase tracking-wider">Floor</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-text-muted hover:text-text-main dark:hover:text-white transition-colors" href="index.html">
                <div class="flex h-6 items-center justify-center">
                    <span class="material-symbols-outlined text-[24px]">edit_note</span>
                </div>
                <p class="text-xs font-medium font-display uppercase tracking-wider">Tickets</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-text-muted hover:text-text-main dark:hover:text-white transition-colors" href="#">
                <div class="flex h-6 items-center justify-center">
                    <span class="material-symbols-outlined text-[24px]">monitor</span>
                </div>
                <p class="text-xs font-medium font-display uppercase tracking-wider">KDS</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-text-muted hover:text-text-main dark:hover:text-white transition-colors" href="#">
                <div class="flex h-6 items-center justify-center">
                    <span class="material-symbols-outlined text-[24px]">layers</span>
                </div>
                <p class="text-xs font-medium font-display uppercase tracking-wider">Trompo</p>
            </a>
        </div>
    </nav>
    <script src="js/app.js"></script>
    <script src="js/floor.js"></script>
</body>
</html>
